<section class="catalog-page staff-page">
  <div class="card">
    <div class="catalog-header">
      <div class="catalog-header-actions">
        <div class="search-field search-field-wide">
          <span class="material-icons">search</span>
          <input id="staffSearch" type="search" placeholder="Buscar colaborador" oninput="renderStaff()">
        </div>
        <button class="btn btn-primary btn-action" id="newStaffButton" type="button" onclick="openStaffDialog()">
          <span class="material-icons">person_add</span>
          <span>Novo</span>
        </button>
      </div>
    </div>

    <div id="staffList" class="staff-grid"></div>
  </div>
</section>

<dialog class="item-dialog" id="staffDialog">
  <div class="dialog-shell">
    <div class="dialog-header">
      <h3>Cadastro de colaborador</h3>
      <button type="button" class="btn-icon-ghost" onclick="closeStaffDialog()">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="dialog-body">
      {{staffForm}}
    </div>
  </div>
</dialog>
